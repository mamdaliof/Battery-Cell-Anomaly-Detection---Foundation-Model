model_name: "facebook/dinov3-vitb16-pretrain-lvd1689m"
output_dir: "outputs/det_all"

# YOLO specific options
yolo_model_config: "configs/det/yolo26_dino.yaml"
yolo_data_yaml: "data/kfold_detection/battery_detection_all.yaml"

# Data configuration
# WARNING: Standard augmentation fields below are placeholders kept for classification schema parity.
# To configure YOLO's internal augmentations, set augmentations_enabled to true and use
# the optional yolo_augmentations dictionary overrides.
data:
  data_dir: "data/kfold_detection"

  train_subdir: "train"
  val_subdir: "val"
  normal_class_name: "normal"
  abnormal_class_name: "abnormal"
  image_size: 256

  # Optional direct YOLO overrides (ignored if augmentations_enabled: false)
  yolo_augmentations:
    hsv_h: 0.5       # HSV-Hue augmentation (fraction)
    hsv_s: 0.4       # HSV-Saturation (fraction)
    hsv_v: 0.4       # HSV-Value (brightness) (fraction)
    degrees: 20.0    # Rotation (+/- deg)
    translate: 0.1   # Translation (+/- fraction)
    scale: 0.1       # Scale (+/- gain)
    shear: 0.1       # Shear (+/- deg)
    perspective: 0.0 # Perspective (+/- fraction)
    flipud: 0.5      # Up-down flip (probability)
    fliplr: 0.5      # Left-right flip (probability)
    mosaic: 0.5      # Mosaic (probability) - 4 images combined
    mixup: 0.1       # Mixup (probability) - blend images
    copy_paste: 0.0  # Segment copy-paste (probability)
    erasing: 0.4     # Random erasing (probability)

  augmentations_enabled: true
  aug_global_prob: 0.66
  aug_max_transforms: 3

  horizontal_flip_prob: 0.5
  rotation_degrees: 20.0
  rotation_prob: 0.5

  random_resized_crop_scale: [0.9, 1.1]
  random_resized_crop_ratio: [0.9, 1.1]
  random_resized_crop_prob: 0.5

  color_jitter_brightness: 0.4
  color_jitter_contrast: 0.4
  color_jitter_saturation: 0.4
  color_jitter_hue: 0.5
  color_jitter_prob: 0.5

  gaussian_noise_std: 0.0
  gaussian_noise_prob: 0.0

# Head configuration (kept for schema compatibility)
head:
  num_labels: 2
  depth: 1
  hidden_dim: null
  dropout: 0.0

# PEFT Configuration (LoRA active)
peft:
  type: "lora"
  lora_r: 8
  lora_alpha: 16
  lora_dropout: 0.1
  lora_target_modules: ["q_proj", "v_proj"]
  lora_target_blocks: null
  adapter_bottleneck_dim: 64
  adapter_dropout: 0.1
  adapter_target_blocks: null
  vpt_num_tokens: 10
  vpt_deep: false
  vpt_target_blocks: null

# Training hyperparameters
num_epochs: 1
batch_size: 4
learning_rate: 0.0005

early_stopping_patience: 1
metric_for_best: "eval_f1"
greater_is_better: true
seed: 42

# Learning rate scheduler configuration
scheduler:
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.1

# Automatic mixed precision (AMP) configuration
amp:
  fp16: false
  bf16: false

# Imbalance handling configuration (kept for schema compatibility)
imbalance:
  loss_type: "cross_entropy"
  class_weights: "none"
  focal_gamma: 2.0
  focal_alpha: null
  oversampling_method: "none"

# K-Fold configuration
fold: null


model_name: "facebook/dinov3-vitb16-pretrain-lvd1689m"
output_dir: "outputs"

# YOLO specific options
yolo_model_config: "configs/det/yolo26_dino.yaml"
yolo_data_yaml: "data/det_v1.0/battery_detection_all.yaml"

# Data configuration (kept for comparability)
data:
  data_dir: "data"
  train_subdir: "train"
  val_subdir: "val"
  normal_class_name: "normal"
  abnormal_class_name: "abnormal"
  image_size: 224

  augmentations_enabled: false
  aug_global_prob: 0.0
  aug_max_transforms: 0

  horizontal_flip_prob: 0.0
  rotation_degrees: 0.0
  rotation_prob: 0.0

  random_resized_crop_scale: [1.0, 1.0]
  random_resized_crop_ratio: [1.0, 1.0]
  random_resized_crop_prob: 0.0

  color_jitter_brightness: 0.0
  color_jitter_contrast: 0.0
  color_jitter_saturation: 0.0
  color_jitter_hue: 0.0
  color_jitter_prob: 0.0

  gaussian_noise_std: 0.0
  gaussian_noise_prob: 0.0

# Head configuration (kept for schema compatibility)
head:
  num_labels: 2
  depth: 1
  hidden_dim: null
  dropout: 0.0

# PEFT Configuration
peft:
  type: "none"
  lora_r: 8
  lora_alpha: 16
  lora_dropout: 0.0
  lora_target_modules: ["q_proj", "v_proj"]
  lora_target_blocks: null
  adapter_bottleneck_dim: 64
  adapter_dropout: 0.0
  adapter_target_blocks: null
  vpt_num_tokens: 10
  vpt_deep: false
  vpt_target_blocks: null

# Training hyperparameters
num_epochs: 1
batch_size: 4
learning_rate: 0.0005

early_stopping_patience: 1
metric_for_best: "eval_f1"
greater_is_better: true
seed: 42

# Learning rate scheduler configuration
scheduler:
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.1

# Automatic mixed precision (AMP) configuration
amp:
  fp16: false
  bf16: false

# Imbalance handling configuration (kept for schema compatibility)
imbalance:
  loss_type: "cross_entropy"
  class_weights: "none"
  focal_gamma: 2.0
  focal_alpha: null
  oversampling_method: "none"

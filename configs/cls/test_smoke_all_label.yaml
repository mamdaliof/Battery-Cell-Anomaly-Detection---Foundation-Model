model_name: "facebook/dinov3-vitb16-pretrain-lvd1689m"
output_dir: "outputs/cls_all"  # base directory where all experiment runs will be stored

# Data configuration
data:
  data_dir: "data/cls_v1.0"  # root directory containing train/ and val/ classification folders
  train_subdir: "train"  # subdirectory name for training split under data_dir
  val_subdir: "val"  # subdirectory name for validation split under data_dir
  normal_class_name: "normal"  # folder name for the normal class
  abnormal_class_name: "abnormal"  # folder name for the abnormal class
  image_size: 256  # if null, use DINOv3 processor default size; otherwise override with this value

  augmentations_enabled: false  # disable augmentations for a quick smoke test run
  aug_global_prob: 0.0  # no augmentations applied in this test config
  aug_max_transforms: 0  # no transforms per image

  horizontal_flip_prob: 0.0  # unused when augmentations_enabled is false
  rotation_degrees: 0.0  # unused in this test config
  rotation_prob: 0.0  # unused in this test config

  random_resized_crop_scale: [1.0, 1.0]  # placeholder values; not used in this test
  random_resized_crop_ratio: [1.0, 1.0]  # placeholder values; not used in this test
  random_resized_crop_prob: 0.0  # disabled in this test config

  color_jitter_brightness: 0.0  # disabled for test
  color_jitter_contrast: 0.0  # disabled for test
  color_jitter_saturation: 0.0  # disabled for test
  color_jitter_hue: 0.0  # disabled for test
  color_jitter_prob: 0.0  # disabled in this test config

  gaussian_noise_std: 0.0  # disabled for test
  gaussian_noise_prob: 0.0  # disabled for test

# Classification head configuration
head:
  num_labels: 2  # binary classification (normal vs abnormal)
  depth: 1  # simple linear head for faster test
  hidden_dim: null  # not used when depth == 1
  dropout: 0.0  # no dropout for a quick test

# PEFT Configuration
peft:
  type: "none"  # PEFT method: none, lora, adapter, visual_prompt
  lora_r: 8
  lora_alpha: 16
  lora_dropout: 0.0
  lora_target_modules: ["q_proj", "v_proj"]
  lora_target_blocks: null
  adapter_bottleneck_dim: 64
  adapter_dropout: 0.0
  adapter_target_blocks: null
  vpt_num_tokens: 10
  vpt_deep: false
  vpt_target_blocks: null

# Training hyperparameters
num_epochs: 1  # single epoch for a fast sanity check
batch_size: 4  # small batch size to reduce memory and speed up test
learning_rate: 0.0005  # keeps the same LR as baseline for now

early_stopping_patience: 1  # early stopping irrelevant here (only 1 epoch)
metric_for_best: "eval_f1"  # still track F1 for consistency
greater_is_better: true  # higher F1 is better
seed: 42  # global random seed for reproducibility

# Learning rate scheduler configuration
scheduler:
  lr_scheduler_type: "cosine"  # cosine scheduler with warmup
  warmup_ratio: 0.1  # warmup ratio

# Automatic mixed precision (AMP) configuration
amp:
  fp16: false  # AMP off for simpler debugging
  bf16: false  # AMP off for simpler debugging

# Imbalance handling configuration
imbalance:
  loss_type: "cross_entropy"       # loss type: "cross_entropy", "focal"
  class_weights: "none"            # class weights: "none", "balanced", "inverse"
  focal_gamma: 2.0                 # gamma parameter for Focal Loss (used if loss_type is "focal")
  focal_alpha: null                # alpha parameter for Focal Loss (used if loss_type is "focal")
  oversampling_method: "none"      # oversampling method: "none", "weighted_sampler", "data_level"

model_name: "facebook/dinov3-vitb16-pretrain-lvd1689m"
output_dir: "outputs"

# Data configuration (unmodified)
data:
  data_dir: "data"
  train_subdir: "train"
  val_subdir: "val"
  normal_class_name: "normal"
  abnormal_class_name: "abnormality"
  image_size: 256

  augmentations_enabled: true
  aug_global_prob: 1.0
  aug_max_transforms: 3

  horizontal_flip_prob: 0.5
  rotation_degrees: 10.0
  rotation_prob: 0.3

  random_resized_crop_scale: [0.9, 1.0]
  random_resized_crop_ratio: [0.9, 1.1]
  random_resized_crop_prob: 0.7

  color_jitter_brightness: 0.1
  color_jitter_contrast: 0.1
  color_jitter_saturation: 0.1
  color_jitter_hue: 0.02
  color_jitter_prob: 0.9

  gaussian_noise_std: 0.01
  gaussian_noise_prob: 0.4

# Classification head configuration (Linear head remains trainable)
head:
  num_labels: 2
  depth: 1
  hidden_dim: null
  dropout: 0.0

# PEFT Configuration: LoRA Ablation
# Play with lora_r, lora_alpha, and target blocks.
peft:
  type: "lora"
  
  # LoRA specific parameters
  lora_r: 8                    # Rank: e.g. 4, 8, 16, 32
  lora_alpha: 16               # Scaling: usually 2 * lora_r
  lora_dropout: 0.1
  lora_target_modules: ["q_proj", "v_proj"]  # Modules to adapt

  # Layers/blocks to adapt (null = all layers adapted)
  # For 12-layer ViT: [8, 9, 10, 11] will only adapt the last 4 layers.
  lora_target_blocks: [8, 9, 10, 11]

  adapter_bottleneck_dim: 64
  adapter_dropout: 0.0
  adapter_target_blocks: null
  vpt_num_tokens: 10
  vpt_deep: false
  vpt_target_blocks: null

# Training hyperparameters (typically smaller LR for PEFT vs linear probe)
num_epochs: 10
batch_size: 16
learning_rate: 0.0003  # typical LoRA LR is 1e-4 to 3e-4

early_stopping_patience: 3
metric_for_best: "eval_f1"
greater_is_better: true

# Learning rate scheduler configuration
scheduler:
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.1

# Automatic mixed precision (AMP) configuration
amp:
  fp16: false
  bf16: false

# Imbalance handling configuration (Unmodified)
imbalance:
  loss_type: "cross_entropy"
  class_weights: "none"
  focal_gamma: 2.0
  focal_alpha: null
  oversampling_method: "none"

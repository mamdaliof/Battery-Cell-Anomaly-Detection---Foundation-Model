model_name: "facebook/dinov3-vitb16-pretrain-lvd1689m"
output_dir: "outputs"

# Data configuration
data:
  data_dir: "data"
  train_subdir: "train"
  val_subdir: "val"
  normal_class_name: "normal"
  abnormal_class_name: "abnormal"
  image_size: null

  augmentations_enabled: false
  aug_global_prob: 0.0
  aug_max_transforms: 0

  horizontal_flip_prob: 0.0
  rotation_degrees: 0.0
  rotation_prob: 0.0

  random_resized_crop_scale: [1.0, 1.0]
  random_resized_crop_ratio: [1.0, 1.0]
  random_resized_crop_prob: 0.0

  color_jitter_brightness: 0.0
  color_jitter_contrast: 0.0
  color_jitter_saturation: 0.0
  color_jitter_hue: 0.0
  color_jitter_prob: 0.0

  gaussian_noise_std: 0.0
  gaussian_noise_prob: 0.0

# Classification head configuration
head:
  num_labels: 2
  depth: 1
  hidden_dim: null
  dropout: 0.0

# PEFT Configuration
peft:
  type: "lora" # none, lora, adapter, visual_prompt
  
  # LoRA parameters
  lora_r: 8
  lora_alpha: 16
  lora_dropout: 0.1
  lora_target_modules: ["q_proj", "v_proj"]
  
  # Adapter parameters (change type to "adapter" to activate)
  adapter_bottleneck_dim: 64
  adapter_dropout: 0.1
  
  # Visual Prompt Tuning (VPT) parameters (change type to "visual_prompt" to activate)
  vpt_num_tokens: 10
  vpt_deep: false # set true for Deep VPT

# Training hyperparameters
num_epochs: 1
batch_size: 4
learning_rate: 0.0005

early_stopping_patience: 1
metric_for_best: "eval_f1"
greater_is_better: true

# Learning rate scheduler configuration
scheduler:
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.1

# Automatic mixed precision (AMP) configuration
amp:
  fp16: false
  bf16: false

# Imbalance handling configuration
imbalance:
  loss_type: "cross_entropy"       # loss type: "cross_entropy", "focal"
  class_weights: "none"            # class weights: "none", "balanced", "inverse"
  focal_gamma: 2.0                 # gamma parameter for Focal Loss (used if loss_type is "focal")
  focal_alpha: null                # alpha parameter for Focal Loss (used if loss_type is "focal")
  oversampling_method: "none"      # oversampling method: "none", "weighted_sampler", "data_level"

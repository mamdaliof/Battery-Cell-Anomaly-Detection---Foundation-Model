model_name: "facebook/dinov3-vitb16-pretrain-lvd1689m"  # DINOv3 backbone identifier on the Hugging Face Hub
output_dir: "outputs"  # base directory where all experiment runs will be stored

# Data configuration
data:
  data_dir: "data"  # root directory containing train/ and val/ classification folders
  train_subdir: "train"  # subdirectory name for training split under data_dir
  val_subdir: "val"  # subdirectory name for validation split under data_dir
  normal_class_name: "normal"  # folder name for the normal class
  abnormal_class_name: "abnormal"  # folder name for the abnormal class
  image_size: 256  # if null, use DINOv3 processor default size; otherwise override with this value

  augmentations_enabled: true  # master switch to turn all training-time augmentations on/off
  aug_global_prob: 1.0  # probability that any augmentation is applied to a given training image
  aug_max_transforms: 3  # maximum number of different transforms applied to one image in sequence

  horizontal_flip_prob: 0.5  # relative probability of selecting horizontal flip when augmenting
  rotation_degrees: 10.0  # maximum absolute rotation angle in degrees when rotation is used
  rotation_prob: 0.3  # relative probability of selecting rotation when augmenting

  random_resized_crop_scale: [0.9, 1.0]  # min/max scale for random resized crop (fraction of original area)
  random_resized_crop_ratio: [0.9, 1.1]  # min/max aspect ratio for random resized crop
  random_resized_crop_prob: 0.7  # relative probability of selecting random resized crop when augmenting

  color_jitter_brightness: 0.1  # magnitude of brightness jitter in color jitter
  color_jitter_contrast: 0.1  # magnitude of contrast jitter in color jitter
  color_jitter_saturation: 0.1  # magnitude of saturation jitter in color jitter
  color_jitter_hue: 0.02  # magnitude of hue jitter in color jitter
  color_jitter_prob: 0.9  # relative probability of selecting color jitter when augmenting

  gaussian_noise_std: 0.01  # standard deviation of Gaussian noise added to image pixels
  gaussian_noise_prob: 0.4  # relative probability of selecting Gaussian noise when augmenting

# Classification head configuration
head:
  num_labels: 2  # number of output classes for classification
  depth: 1  # number of linear layers in the head (1 = simple linear classifier)
  hidden_dim: null  # hidden dimension for head layers when depth > 1; ignored if depth == 1
  dropout: 0.0  # dropout probability applied between head layers when depth > 1

# PEFT Configuration
peft:
  type: "none"  # PEFT method: none, lora, adapter, visual_prompt
  lora_r: 8
  lora_alpha: 16
  lora_dropout: 0.0
  lora_target_modules: ["q_proj", "v_proj"]
  lora_target_blocks: null
  adapter_bottleneck_dim: 64
  adapter_dropout: 0.0
  adapter_target_blocks: null
  vpt_num_tokens: 10
  vpt_deep: false
  vpt_target_blocks: null

# Training hyperparameters
num_epochs: 5  # total number of training epochs
batch_size: 16  # per-device batch size for both training and evaluation
learning_rate: 0.0005  # initial learning rate for the optimizer

early_stopping_patience: 3  # number of evaluation steps (epochs) with no improvement before early stopping
metric_for_best: "eval_loss"  # metric tracked for selecting the best model checkpoint (e.g. eval_loss, eval_f1)
greater_is_better: false  # set to true if higher metric values are better (e.g. for F1), false for loss
seed: 42  # global random seed for reproducibility

# Learning rate scheduler configuration
scheduler:
  lr_scheduler_type: "cosine"  # type of learning rate scheduler: linear, cosine, cosine_with_restarts, constant, etc.
  warmup_ratio: 0.1  # fraction of total training steps used for linear warmup of the learning rate

# Automatic mixed precision (AMP) configuration
amp:
  fp16: false  # use 16-bit floating point training if supported; reduces memory and may speed up training
  bf16: false  # use bfloat16 training if supported; often preferred on newer NVIDIA GPUs

# Imbalance handling configuration
imbalance:
  loss_type: "cross_entropy"       # loss type: "cross_entropy", "focal"
  class_weights: "none"            # class weights: "none", "balanced", "inverse"
  focal_gamma: 2.0                 # gamma parameter for Focal Loss (used if loss_type is "focal")
  focal_alpha: null                # alpha parameter for Focal Loss (used if loss_type is "focal")
  oversampling_method: "none"      # oversampling method: "none", "weighted_sampler", "data_level"
